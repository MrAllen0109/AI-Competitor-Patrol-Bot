name: 🚀 AI 竞品舆情云端巡逻机器人

on:
  schedule:
    - cron: '0 */2 * * *'
  # 支持你在网页上手动点击按钮立即运行
  workflow_dispatch: 

jobs:
  run-patrol:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 检出代码 (Checkout Code)
        uses: actions/checkout@v3

      - name: 🐍 配置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: ⚙️ 安装依赖库
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🤖 启动大模型分析与微信推送
        env:
          # 从你刚才存好的保险箱（Secrets）里读取钥匙
          COZE_PAT: ${{ secrets.COZE_PAT }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python send_to_wechat.py
